name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v9
        with:
          # Diverged from sibling livepeer-modules-project pin (still on
          # golangci-lint v1.64.8 + golangci-lint-action@v6) — this repo
          # leads on the v2 bump because v1.x is fragile against any local
          # Go ≥ 1.26 (export-data format mismatch). Tracking issue for
          # sibling lockstep: TBD on first execution. Bump with a
          # re-triage commit; don't chase `latest` — silent-breakage risk.
          version: v2.11.4

  gofmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo
            echo "--- diff ---"
            gofmt -d .
            exit 1
          fi

  go-mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: verify go.mod / go.sum are tidy
        run: |
          cp go.mod go.mod.before
          [ -f go.sum ] && cp go.sum go.sum.before || true
          go mod tidy
          if ! diff -u go.mod.before go.mod > /dev/null; then
            echo "::error::go mod tidy produced changes — commit them."
            diff -u go.mod.before go.mod || true
            exit 1
          fi
          if [ -f go.sum.before ] && ! diff -u go.sum.before go.sum > /dev/null; then
            echo "::error::go mod tidy changed go.sum — commit it."
            diff -u go.sum.before go.sum || true
            exit 1
          fi

  govulncheck:
    runs-on: ubuntu-latest
    # Findings are informational, not blocking. Most hits are stdlib
    # CVEs that trail the latest Go patch-release; bump the `toolchain`
    # directive in go.mod to absorb them. Non-stdlib hits SHOULD be
    # addressed — review this job's output on every PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  custom-lints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: payment-middleware-check
        # Verifies every paid HTTP route is registered through
        # runtime/http.RegisterPaidRoute. Skipping is a security bug,
        # not a style issue — see core-beliefs.md invariant 3.
        run: go run ./lint/payment-middleware-check --root .
