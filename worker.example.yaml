# Annotated worker.yaml — shared v3.0.1 config for openai-worker-node
# and livepeer-payment-daemon (receiver mode).
#
# Both processes parse this file independently and cross-check the
# shared capability catalog at startup. Drift is a hard startup error.
#
# Copy this file to worker.yaml at the repo root (gitignored), edit the
# placeholders, and let compose mount it into both containers at
# /etc/livepeer/worker.yaml.

protocol_version: 1

# Optional orch-internal metadata for coordinator scrape/display.
# Omit entirely when unused.
# worker_eth_address: "0xaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"

# Optional bearer auth for GET /registry/offerings. If omitted/empty,
# the endpoint is public.
# auth_token: "replace-me"

payment_daemon:
  recipient_eth_address: "0xREPLACE_WITH_RECIPIENT_ETH_ADDRESS"

  broker:
    # Production = ethereum (real on-chain TicketBroker). For local
    # dev, switch to fake and add fake_sender_balances_wei.
    mode: ethereum
    rpc_url: "https://arb1.arbitrum.io/rpc"
    ticket_broker_contract: "0xa8bB618B1520E284046F3dFc448851A1Ff26e41B"

    # Dev example:
    # mode: fake
    # fake_sender_balances_wei:
    #   "0xBRIDGE_ADDR_HERE": "1000000000000000000"

worker:
  http_listen: "0.0.0.0:8080"
  payment_daemon_socket: /var/run/livepeer/payment-daemon.sock

  # Cap on simultaneous in-flight paid requests. Size to roughly match
  # what Ollama can serve concurrently — too high and requests pile up
  # at Ollama, too low and the worker 503s under bursts.
  max_concurrent_requests: 16

  # Cross-check this YAML against the daemon's ListCapabilities at
  # startup; refuse to serve if the catalogs diverge. Always true in
  # production — disabling re-opens the drift class of bugs the shared
  # file model would otherwise hide.
  verify_daemon_consistency_on_start: true

# Prices = wei per work-unit. The worker advertises them on
# /registry/offerings and dispatches each request to the matching
# backend_url. The daemon reads the same capability catalog from this
# file and ignores backend_url. Daemon keystore + state-db paths stay
# container/CLI owned (see compose.yaml / compose.prod.yaml); they are
# not part of worker.yaml.
capabilities:
  - capability: "openai:/v1/chat/completions"
    work_unit: token
    # Optional opaque capability metadata for coordinator/gateway
    # consumers. Must be a JSON object when present.
    # extra:
    #   supports_streaming: true
    offerings:
      # GROWTH-PHASE DEFAULTS — bridge keeps ~90 % of revenue while
      # building a customer base; workers participate at a loss on the
      # bet that volume grows. These rates DO NOT cover a consumer GPU's
      # daily cost. Operators chasing break-even should override
      # `price_per_work_unit_wei` per-model based on measured economics
      # (see bridge docs/design-docs/pricing-model.md
      # "Measurement and adjustment").
      #
      # Pick the entry whose customer-tier matches the model class:
      #
      #   starter  customer $0.05/$0.10 per 1M, worker take ~$0.005/M
      #     price_per_work_unit_wei: "1250000"
      #
      #   standard customer $0.15/$0.40 per 1M, worker take ~$0.02/M
      #     price_per_work_unit_wei: "5000000"
      #
      #   pro      customer $0.40/$1.20 per 1M, worker take ~$0.06/M
      #     price_per_work_unit_wei: "15000000"
      #
      #   premium  customer $2.50/$6.00 per 1M, worker take ~$0.30/M
      #     (specialty / niche / fine-tune / single-user-serving)
      #     price_per_work_unit_wei: "75000000"
      #
      # Break-even reference (RTX 5090 single-user, $12/day GPU cost):
      # the worker needs ~$2/M (`price_per_work_unit_wei: "500000000"`)
      # to cover hardware costs at premium-tier customer pricing. Set
      # higher than the growth-phase default once measured demand
      # justifies it; the bridge will keep routing as long as its margin
      # against the matching customer tier is positive.
      # Conversions assume $4000/ETH; multiply by current ETH price
      # ratio to track market.
      - id: "gemma4:26b"
        price_per_work_unit_wei: "1250000"
        # Optional opaque per-offering metadata. Must be a JSON object
        # when present.
        # constraints:
        #   max_context_tokens: 8192
        # Ollama's OpenAI-compatible endpoint. If Ollama runs on the
        # same docker host as this stack, use the host gateway IP
        # (172.17.0.1 on Linux) or attach Ollama to the same docker
        # network and use its container name. If Ollama runs on a
        # different VPS, use its private/public hostname.
        backend_url: "http://REPLACE_WITH_OLLAMA_HOST:11434"

      # Example of a premium-tier model entry — uncensored fine-tune
      # served single-user via Ollama (no batching). Drop in your own
      # specialty model name and adjust price as your hardware/demand
      # dictates.
      #
      # - id: "uncensored-llama-3-70b"
      #   price_per_work_unit_wei: "75000000"   # ≈ $0.30/M tokens (premium tier)
      #   backend_url: "http://REPLACE_WITH_OLLAMA_HOST:11434"

  # ─── Other capabilities (uncomment when the backend is ready) ────────
  # All worker prices below assume ~10× spread under the bridge's v2
  # rate card (src/config/pricing.ts) so the bridge keeps a healthy
  # margin for infra + redemption gas. Adjust to your hardware costs.
  # Conversions assume $4000/ETH; tune up/down as ETH price moves.
  #
  # - capability: "openai:/v1/embeddings"
  #   work_unit: token
  #   offerings:
  #     - id: "text-embedding-3-small"
  #       # 125 wei/token ≈ $0.0005/1M (bridge bills $0.005/1M).
  #       price_per_work_unit_wei: "125"
  #       backend_url: "http://REPLACE_WITH_EMBEDDINGS_BACKEND:PORT"
  #
  # - capability: "openai:/v1/images/generations"
  #   work_unit: image_step_megapixel
  #   offerings:
  #     - id: "sdxl-turbo"
  #       # 50 mwei/MP-step (bridge bills $0.002/img for sdxl). Tune
  #       # against actual GPU cost per image-step-megapixel.
  #       price_per_work_unit_wei: "50000000"
  #       backend_url: "http://REPLACE_WITH_IMAGES_BACKEND:PORT"
  #
  # - capability: "openai:/v1/images/edits"
  #   work_unit: image_step_megapixel
  #   offerings:
  #     - id: "sdxl-edit"
  #       price_per_work_unit_wei: "50000000"
  #       backend_url: "http://REPLACE_WITH_IMAGES_BACKEND:PORT"
  #
  # - capability: "openai:/v1/audio/speech"
  #   work_unit: character
  #   offerings:
  #     - id: "tts-1"
  #       # 125 wei/char ≈ $0.50/1M chars (bridge bills $5/1M).
  #       price_per_work_unit_wei: "125"
  #       backend_url: "http://REPLACE_WITH_TTS_BACKEND:PORT"
  #
  # - capability: "openai:/v1/audio/transcriptions"
  #   work_unit: audio_second
  #   offerings:
  #     - id: "whisper-large-v3"
  #       # 1.25 mwei/sec ≈ $0.0003/min (bridge bills $0.003/min).
  #       price_per_work_unit_wei: "1250000"
  #       backend_url: "http://REPLACE_WITH_STT_BACKEND:PORT"
