# Annotated example worker.yaml.
#
# Shared between livepeer-payment-daemon (receiver mode) and this
# openai-worker-node. Both parse independently at startup; mismatch is
# a fail-closed condition.
#
# Contract: livepeer-payment-library/docs/design-docs/shared-yaml.md

protocol_version: 1

# ─── Daemon-only section ─────────────────────────────────────────────────
# Parsed by livepeer-payment-daemon. Ignored by openai-worker-node.
payment_daemon:
  grpc_listen: unix:///var/run/lpd.sock
  recipient_eth_address: "0xREPLACE_WITH_WORKER_ETH_ADDRESS"

  broker:
    # mode: ethereum → real on-chain broker (production)
    # mode: fake     → in-memory fake for local dev / CI
    mode: ethereum
    rpc_url: "https://arb1.arbitrum.io/rpc"
    ticket_broker_contract: "0xREPLACE"
    # fake-mode only:
    # fake_sender_balances_wei:
    #   "0xBRIDGE_ADDR": "1000000000000000000"

  keystore:
    path: /etc/livepeer/keystore/recipient.json
    passphrase_env: LIVEPEER_KEYSTORE_PASSPHRASE

  store:
    kind: bolt
    path: /var/lib/livepeer/payment-daemon.db

# ─── Worker-only section ────────────────────────────────────────────────
# Parsed by openai-worker-node. Ignored by livepeer-payment-daemon.
worker:
  http_listen: "0.0.0.0:8080"
  payment_daemon_socket: /var/run/lpd.sock
  max_concurrent_requests: 32
  # Call PayeeDaemon.ListCapabilities at startup and fail if the daemon's
  # catalog doesn't match this file. Recommended true; disabling is a
  # footgun that re-opens the drift failure mode the shared YAML exists
  # to prevent.
  verify_daemon_consistency_on_start: true

# ─── Shared section ─────────────────────────────────────────────────────
# Both daemon and worker parse these. Prices are the source of truth for
# daemon's GetQuote responses; worker advertises the same values on its
# HTTP /capabilities endpoint and uses backend_url for request routing.
capabilities:
  - capability: "openai:/v1/chat/completions"
    work_unit: token
    models:
      - model: "llama-3.3-70b"
        price_per_work_unit_wei: "2000000000"
        backend_url: "http://localhost:8000"
      - model: "mistral-7b-instruct"
        price_per_work_unit_wei: "500000000"
        backend_url: "http://localhost:8001"

  - capability: "openai:/v1/embeddings"
    work_unit: token
    models:
      - model: "text-embedding-3-small"
        price_per_work_unit_wei: "100000000"
        backend_url: "http://localhost:8002"

  - capability: "openai:/v1/images/generations"
    work_unit: image_step_megapixel
    models:
      - model: "sdxl-turbo"
        price_per_work_unit_wei: "500000000000"
        backend_url: "http://localhost:8003"

  - capability: "openai:/v1/images/edits"
    work_unit: image_step_megapixel
    models:
      - model: "sdxl-edit"
        price_per_work_unit_wei: "500000000000"
        backend_url: "http://localhost:8003"

  - capability: "openai:/v1/audio/speech"
    work_unit: character
    models:
      - model: "tts-1"
        price_per_work_unit_wei: "100000000"
        backend_url: "http://localhost:8005"

  - capability: "openai:/v1/audio/transcriptions"
    work_unit: audio_second
    models:
      - model: "whisper-large-v3"
        price_per_work_unit_wei: "100000000000"
        backend_url: "http://localhost:8004"
